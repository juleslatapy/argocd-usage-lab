apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-frontend-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: labfrontendapp
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: labfrontendapp
    spec:
      containers:
      - image: kodekloud/webapp-color:v1  # field where the image being used is specified at first
        imagePullPolicy: IfNotPresent
        name: labfrontendapp
        ports:
        - containerPort: 8080
          protocol: TCP
        resources: {}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      securityContext: {}
